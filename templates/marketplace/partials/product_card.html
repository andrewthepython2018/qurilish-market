<div class="col-sm-6 col-lg-3"><article class="product-card h-100"><a href="{{ product.get_absolute_url }}" class="product-card-media">{% if product.image %}<img src="{{ product.image.url }}" alt="{{ product.name }}">{% else %}<span>{{ product.category.name }}</span>{% endif %}</a><div class="p-3 d-flex flex-column gap-2"><div class="d-flex justify-content-between gap-2"><span class="badge text-bg-light">{{ product.city }}</span><span class="badge text-bg-light">{{ product.stock }} {{ product.unit }}</span></div><h3 class="h6 mb-0"><a href="{{ product.get_absolute_url }}" class="stretched-link text-decoration-none text-dark">{{ product.name }}</a></h3><p class="small text-secondary mb-1">{{ product.seller.name }}</p><div class="fw-bold">{{ product.price|floatformat:0 }} сум / {{ product.unit }}</div></div></article></div>
